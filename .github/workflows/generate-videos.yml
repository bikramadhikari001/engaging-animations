name: Generate Videos

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Start dev server
        run: |
          npx vite --host 0.0.0.0 --port 3000 &
          sleep 5
          curl -sf http://localhost:3000 > /dev/null && echo "✅ Dev server ready"

      - name: Record all videos (frame-by-frame)
        run: node record-all.mjs
        env:
          CI: true

      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 30

      - name: Keepalive commit
        run: |
          date -u "+%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
