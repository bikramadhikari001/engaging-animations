name: Generate & Publish Video

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Google API deps
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/credentials.json
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > /tmp/token.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: Start dev server
        run: |
          npx vite --host 0.0.0.0 --port 3000 &
          sleep 5
          curl -sf http://localhost:3000 > /dev/null && echo "✅ Dev server ready"

      - name: Generate & publish video
        run: node publish.mjs
        env:
          CI: true
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7

      - name: Keepalive commit
        run: |
          date -u "+%Y-%m-%dT%H:%M:%SZ" > .keepalive
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .keepalive
          git diff --cached --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
